<html lang="id">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f766e 0%, #0d9488 50%, #14b8a6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-icon {
            text-align: center;
            margin-bottom: 16px;
        }

        .header-icon span {
            font-size: 48px;
        }

        h1 {
            text-align: center;
            color: #0f766e;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .school-name {
            text-align: center;
            color: #334155;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .exam-title {
            text-align: center;
            background: #ccfbf1;
            color: #0f766e;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            margin: 16px 0;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }

        .stats {
            background: #f0fdfa;
            text-align: center;
            padding: 10px;
            border-radius: 20px;
            margin-bottom: 28px;
            font-size: 13px;
            font-weight: 600;
            color: #0f766e;
            border: 1px solid #ccfbf1;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e293b;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
            background: #f8fafc;
        }

        input:focus {
            border-color: #14b8a6;
            background: white;
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(15, 118, 110, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 16px;
            margin-top: 20px;
            font-size: 13px;
            display: none;
            border-left: 4px solid #b91c1c;
        }

        .success-msg {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 16px;
            margin-top: 20px;
            font-size: 13px;
            display: none;
            border-left: 4px solid #166534;
        }

        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #94a3b8;
            text-align: center;
        }

        @media (max-width: 480px) {
            .card {
                padding: 28px 20px;
            }
            h1 {
                font-size: 18px;
            }
        }
    </style>
</head>

        // Validasi ke database statis
        if (DATABASE_SISWA[userId]) {
            if (DATABASE_SISWA[userId] === pin) {
                showSuccess("✅ Login berhasil! Mengalihkan ke ruang asesmen...");
                setTimeout(() => {
                    window.location.href = TARGET_URL;
                }, 1200);
            } else {
                showError(`❌ PIN salah untuk ID: ${userId}`);
                document.getElementById("password").value = "";
            }
        } else {
            showError("❌ ID Peserta tidak terdaftar! Periksa kembali ID Anda.");
            document.getElementById("password").value = "";
        }
    }

    function showError(msg) {
        const el = document.getElementById("errorMsg");
        el.innerText = msg;
        el.style.display = "block";
    }

    function showSuccess(msg) {
        const el = document.getElementById("successMsg");
        el.innerText = msg;
        el.style.display = "block";
    }

    // Event tombol Enter
    document.getElementById("userId").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            document.getElementById("password").focus();
        }
    });
    document.getElementById("password").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            handleLogin();
        }
    });
</script>
</body>
</html>
